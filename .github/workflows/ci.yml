name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  backend:
    name: Backend (migrations + e2e against SQL Server)
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD || 'Scada!Pass2026' }}
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$MSSQL_SA_PASSWORD\" -C -No -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s
    env:
      MSSQL_SERVER: "localhost,1433"
      MSSQL_DATABASE: scada_reports
      MSSQL_AUTH_TYPE: sql
      MSSQL_USERNAME: sa
      MSSQL_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD || 'Scada!Pass2026' }}
      MSSQL_ALLOWED_SERVERS: "localhost,1433"
      JWT_SECRET: ci-test-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      SEED_DEMO_DATA: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ODBC Driver 17
        run: |
          curl -sSL -O https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y --no-install-recommends msodbcsql17 unixodbc-dev
      - name: Install Python deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: End-to-end smoke (auth, data, security)
        working-directory: backend
        run: python e2e_smoke.py
      - name: End-to-end report generation (PDF + CSV)
        working-directory: backend
        run: python e2e_report.py
      - name: Tag-mapping suite
        working-directory: backend
        run: python e2e_tagmap.py
