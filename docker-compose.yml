# One-command launch for the full SCADA Reports stack:
#   docker compose up --build
# Then open http://localhost:3000  (API at http://localhost:8000/docs)
#
# Override secrets via a .env file next to this file (see .env.docker.example).

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scada-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Scada!Pass2026}
      MSSQL_PID: Developer
    ports:
      - "14333:1433"   # host:container (host 1433 is often taken by a local SQL Server)
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build: ./backend
    container_name: scada-backend
    environment:
      JWT_SECRET: ${JWT_SECRET:-please-change-this-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      MSSQL_SERVER: db
      MSSQL_DATABASE: scada_reports
      MSSQL_AUTH_TYPE: sql
      MSSQL_USERNAME: sa
      MSSQL_PASSWORD: ${MSSQL_SA_PASSWORD:-Scada!Pass2026}
      MSSQL_ALLOWED_SERVERS: db
      CORS_ALLOW_ORIGINS: http://localhost:3000
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-1}
      OPC_UA_SERVER_URL: ${OPC_UA_SERVER_URL:-opc.tcp://opcua-sim:4840/freeopcua/server/}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      opcua-sim:
        condition: service_started

  opcua-sim:
    build: ./backend
    container_name: scada-opcua-sim
    command: ["python", "opcua_simulator.py"]
    ports:
      - "4840:4840"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: scada-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mssql_data:
